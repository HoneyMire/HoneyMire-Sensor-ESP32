; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-c3-oled

[env]
platform = espressif32@6.7.0
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
build_flags = 
	-DCORE_DEBUG_LEVEL=2
	-DCONFIG_ARDUHAL_LOG_COLORS=1
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DASYNCWEBSERVER_REGEX
	-std=gnu++17
	-DHONEYMIRE_VERSION=\"0.4.2\"
	-DHONEYMIRE_TELNET_PORT=23
	-DHONEYMIRE_SSH_PORT=22
	-DHONEYMIRE_HTTP_PORT=80
	-DHONEYMIRE_ENABLE_SSH=1
	-DHONEYMIRE_USE_TRANSCRIPT=1
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=-1
	-DCONFIG_ASYNC_TCP_USE_WDT=0
build_unflags = -std=gnu++11
extra_scripts = pre:scripts/patch_asynctcp.py
lib_deps = 
	bblanchon/ArduinoJson @ 7.4.3
	esphome/AsyncTCP-esphome @ 2.1.4
	esphome/ESPAsyncWebServer-esphome @ 3.4.0
	ewpa/LibSSH-ESP32 @ 5.8.0

[env:esp32-c3-oled]
board = esp32-c3-devkitm-1
build_flags =
	${env.build_flags}
	-DARDUINO_ESP32C3_DEV
	-DHONEYMIRE_BOARD_NAME=\"ESP32-C3\"
	-DHONEYMIRE_BOARD_KIND_C3=1
	-DHONEYMIRE_HW_MCU=\"esp32-c3\"
	-DHONEYMIRE_HW_BOARD=\"esp32-c3-supermini\"
	-DHONEYMIRE_HW_DISPLAY=\"ssd1306-72x40\"
	-DHONEYMIRE_HUB_EVENTS_MAX_KB=32
	; SSH default-OFF on the C3 (heap-tight). User can enable from
	; /config or the serial menu without re-flashing. The S3 envs
	; keep SSH default-on. See ESP32 stability review S1.
	-DHONEYMIRE_DEFAULT_SSH_ENABLED=0
	-DHONEYMIRE_TN_MAX=3
	-DHONEYMIRE_SSH_MAX=1
	-DHONEYMIRE_DISPLAY_DRIVER=1
	-DHONEYMIRE_DISPLAY_W=72
	-DHONEYMIRE_DISPLAY_H=40
	-DHONEYMIRE_I2C_SDA=5
	-DHONEYMIRE_I2C_SCL=6
	-DHONEYMIRE_BUTTON_PIN=9
	-DHONEYMIRE_LED_PIN=8
lib_deps = 
	${env.lib_deps}
	olikraus/U8g2@2.35.25

[env:esp32-generic]
board = esp32dev
upload_port = /dev/cu.usbserial*
monitor_port = /dev/cu.usbserial*
build_unflags =
	${env.build_unflags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
build_flags =
	${env.build_flags}
	-DHONEYMIRE_BOARD_NAME=\"ESP32\ Generic\"
	-DHONEYMIRE_BOARD_KIND_ESP32_GENERIC=1
	-DHONEYMIRE_HW_MCU=\"esp32\"
	-DHONEYMIRE_HW_BOARD=\"esp32-generic\"
	-DHONEYMIRE_HW_DISPLAY=\"none\"
	-DHONEYMIRE_HUB_EVENTS_MAX_KB=48
	-DHONEYMIRE_DEFAULT_SSH_ENABLED=0
	-DHONEYMIRE_TN_MAX=4
	-DHONEYMIRE_SSH_MAX=1
	-DHONEYMIRE_DISPLAY_DRIVER=0
	-DHONEYMIRE_DISPLAY_W=0
	-DHONEYMIRE_DISPLAY_H=0
	-DHONEYMIRE_BUTTON_PIN=0
	-DHONEYMIRE_LED_PIN=-1
	-DHONEYMIRE_NO_I2C=1
lib_deps =
	${env.lib_deps}

[env:esp32dev]
extends = env:esp32-generic

[env:esp32-wroom]
extends = env:esp32-generic

[env:az-delivery-devkit-v4]
extends = env:esp32-generic

[env:lilygo-t-qt-pro]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.psram_type = qspi
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
build_flags = 
	${env.build_flags}
	-DARDUINO_ESP32S3_DEV
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_USE_MALLOC=1
	-DHONEYMIRE_BOARD_NAME=\"ESP32-S3\ (T-QT\ Pro)\"
	-DHONEYMIRE_BOARD_KIND_S3_TQTPRO=1
	-DHONEYMIRE_HAS_PSRAM=1
	-DHONEYMIRE_HW_MCU=\"esp32-s3\"
	-DHONEYMIRE_HW_BOARD=\"lilygo-t-qt-pro\"
	-DHONEYMIRE_HW_DISPLAY=\"st7735-128x128\"
	-DHONEYMIRE_HUB_EVENTS_MAX_KB=64
	-DHONEYMIRE_TN_MAX=6
	-DHONEYMIRE_SSH_MAX=1
	-DHONEYMIRE_DISPLAY_DRIVER=2
	-DHONEYMIRE_DISPLAY_W=128
	-DHONEYMIRE_DISPLAY_H=128
	-DHONEYMIRE_BUTTON_PIN=0
	-DHONEYMIRE_LED_PIN=-1
	-DHONEYMIRE_NO_I2C=1
monitor_dtr = 0
monitor_rts = 0
lib_deps = 
	${env.lib_deps}
	lovyan03/LovyanGFX @ 1.2.21

[env:esp32-s3-generic]
board = esp32-s3-generic
build_flags =
	${env.build_flags}
	-DARDUINO_ESP32S3_DEV
	-DHONEYMIRE_BOARD_NAME=\"ESP32-S3\ Generic\"
	-DHONEYMIRE_BOARD_KIND_S3_GENERIC=1
	-DHONEYMIRE_USE_UART0_SERIAL=1
	-DHONEYMIRE_HW_MCU=\"esp32-s3\"
	-DHONEYMIRE_HW_BOARD=\"esp32-s3-generic\"
	-DHONEYMIRE_HW_DISPLAY=\"none\"
	-DHONEYMIRE_HUB_EVENTS_MAX_KB=48
	-DHONEYMIRE_TN_MAX=4
	-DHONEYMIRE_SSH_MAX=1
	-DHONEYMIRE_DISPLAY_DRIVER=0
	-DHONEYMIRE_DISPLAY_W=0
	-DHONEYMIRE_DISPLAY_H=0
	-DHONEYMIRE_BUTTON_PIN=0
	-DHONEYMIRE_LED_PIN=-1
	-DHONEYMIRE_NO_I2C=1
lib_deps =
	${env.lib_deps}
monitor_dtr = 0
monitor_rts = 0

[env:esp32-s3-n16r8]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions_16mb.csv
build_flags = 
	${env.build_flags}
	-DARDUINO_ESP32S3_DEV
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_USE_MALLOC=1
	-DHONEYMIRE_BOARD_NAME=\"ESP32-S3\ N16R8\"
	-DHONEYMIRE_BOARD_KIND_S3_N16R8=1
	-DHONEYMIRE_USE_UART0_SERIAL=1
	-DHONEYMIRE_HAS_PSRAM=1
	-DHONEYMIRE_HW_MCU=\"esp32-s3\"
	-DHONEYMIRE_HW_BOARD=\"esp32-s3-n16r8\"
	-DHONEYMIRE_HW_DISPLAY=\"none\"
	-DHONEYMIRE_HUB_EVENTS_MAX_KB=96
	-DHONEYMIRE_TN_MAX=8
	-DHONEYMIRE_SSH_MAX=1
	-DHONEYMIRE_DISPLAY_DRIVER=0
	-DHONEYMIRE_DISPLAY_W=0
	-DHONEYMIRE_DISPLAY_H=0
	-DHONEYMIRE_BUTTON_PIN=0
	-DHONEYMIRE_LED_PIN=-1
	-DHONEYMIRE_NO_I2C=1
lib_deps = 
	${env.lib_deps}
monitor_dtr = 0
monitor_rts = 0
