; HoneyOpus — multi-board ESP32 Telnet/SSH honeypot.
;
; Supported targets:
;   esp32-c3-oled    — ESP32-C3 SuperMini + 0.42" 72×40 SSD1306 OLED  (default)
;   lilygo-t-qt-pro  — LilyGO T-QT Pro     (ESP32-S3, 128×128 IPS, 2 MB PSRAM)
;   esp32-s3-n16r8   — generic ESP32-S3 N16R8 dev board, headless     (8 MB PSRAM)

[platformio]
default_envs = esp32-c3-oled

[env]
platform = espressif32@^6.7.0
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DCONFIG_ARDUHAL_LOG_COLORS=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DASYNCWEBSERVER_REGEX
    -std=gnu++17
    ; ----- HoneyOpus shared tuning -----
    -DHONEYOPUS_TELNET_PORT=23
    -DHONEYOPUS_SSH_PORT=22
    -DHONEYOPUS_HTTP_PORT=80
    -DHONEYOPUS_ENABLE_SSH=1
    ; AsyncTCP-esphome subscribes its event-loop task to the FreeRTOS task
    ; watchdog around every event handler. Our telnet/SSH callbacks open
    ; and write asciinema cast files on LittleFS inline, and a flash GC
    ; cycle can legitimately stall the task for several seconds — which
    ; tripped the WDT and rebooted the device. Compile out AsyncTCP's WDT
    ; instrumentation; the interrupt watchdog still polices true CPU lockups.
    ;
    ; AsyncTCP.h:47 re-defines CONFIG_ASYNC_TCP_USE_WDT=1 whenever
    ; CONFIG_ASYNC_TCP_RUNNING_CORE is not also defined, so we must set
    ; both — otherwise the header silently overrides our -D=0 and the
    ; async_tcp task gets re-subscribed to the WDT.
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=-1
    -DCONFIG_ASYNC_TCP_USE_WDT=0

build_unflags = -std=gnu++11

extra_scripts = pre:scripts/patch_asynctcp.py

lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.3.0
    ewpa/LibSSH-ESP32 @ ^5.2.4

; ===========================================================================
; ESP32-C3 SuperMini + 0.42" 72×40 SSD1306 OLED (current reference board)
; ===========================================================================
[env:esp32-c3-oled]
board = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DARDUINO_ESP32C3_DEV
    -DHONEYOPUS_BOARD_NAME=\"ESP32-C3\"
    -DHONEYOPUS_BOARD_KIND_C3=1
    ; Single-core RISC-V, ~400 KB SRAM, no PSRAM → keep concurrency tight.
    -DHONEYOPUS_TN_MAX=3
    -DHONEYOPUS_SSH_MAX=1
    ; Display: monochrome OLED via U8g2.
    -DHONEYOPUS_DISPLAY_DRIVER=1
    -DHONEYOPUS_DISPLAY_W=72
    -DHONEYOPUS_DISPLAY_H=40
    -DHONEYOPUS_I2C_SDA=5
    -DHONEYOPUS_I2C_SCL=6
    -DHONEYOPUS_BUTTON_PIN=9
    -DHONEYOPUS_LED_PIN=8
lib_deps =
    ${env.lib_deps}
    olikraus/U8g2 @ ^2.35.30

; ===========================================================================
; LilyGO T-QT Pro — ESP32-S3, 0.85" 128×128 IPS color (GC9107), 2 MB PSRAM
; Pinout per the official LilyGO repo.
; ===========================================================================
[env:lilygo-t-qt-pro]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.psram_type = qspi
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
build_flags =
    ${env.build_flags}
    -DARDUINO_ESP32S3_DEV
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DHONEYOPUS_BOARD_NAME=\"ESP32-S3\ (T-QT\ Pro)\"
    -DHONEYOPUS_BOARD_KIND_S3_TQTPRO=1
    -DHONEYOPUS_HAS_PSRAM=1
    ; Dual-core S3 + PSRAM → bump telnet concurrency.
    -DHONEYOPUS_TN_MAX=6
    -DHONEYOPUS_SSH_MAX=1
    ; Display: TFT_eSPI driving GC9107 128×128.
    -DHONEYOPUS_DISPLAY_DRIVER=2
    -DHONEYOPUS_DISPLAY_W=128
    -DHONEYOPUS_DISPLAY_H=128
    -DHONEYOPUS_BUTTON_PIN=0
    -DHONEYOPUS_LED_PIN=-1
    ; Tell display.cpp not to call Wire.begin().
    -DHONEYOPUS_NO_I2C=1
    ; LovyanGFX configuration is done from the C++ side (see display.cpp).
    ; GC9107 is the controller used by the T-QT Pro 0.85" 128×128 IPS panel.
lib_deps =
    ${env.lib_deps}
    lovyan03/LovyanGFX @ ^1.1.16

; ===========================================================================
; Generic ESP32-S3 N16R8 dev board (16 MB flash, 8 MB PSRAM, no display).
; The fastest, most stable target — recommended for sustained exposure.
; ===========================================================================
[env:esp32-s3-n16r8]
board = esp32-s3-devkitc-1
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions_16mb.csv
build_flags =
    ${env.build_flags}
    -DARDUINO_ESP32S3_DEV
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DHONEYOPUS_BOARD_NAME=\"ESP32-S3\ N16R8\"
    -DHONEYOPUS_BOARD_KIND_S3_N16R8=1
    -DHONEYOPUS_HAS_PSRAM=1
    ; Most headroom of the three — push concurrency further.
    -DHONEYOPUS_TN_MAX=8
    -DHONEYOPUS_SSH_MAX=1
    ; Headless: stub display driver, no I²C, no button on a fixed pin.
    -DHONEYOPUS_DISPLAY_DRIVER=0
    -DHONEYOPUS_DISPLAY_W=0
    -DHONEYOPUS_DISPLAY_H=0
    -DHONEYOPUS_BUTTON_PIN=0
    -DHONEYOPUS_LED_PIN=-1
    -DHONEYOPUS_NO_I2C=1
lib_deps =
    ${env.lib_deps}
