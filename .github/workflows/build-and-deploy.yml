name: build-and-deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware & stage site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio esptool

      - name: Build firmware (all boards)
        run: pio run -e esp32-c3-oled -e lilygo-t-qt-pro -e esp32-s3-n16r8

      - name: Compose web-flasher site
        env:
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref_name }}
          REPO:    ${{ github.repository }}
        run: |
          set -euo pipefail
          BOOT_APP0=$(find "$HOME/.platformio/packages" -name boot_app0.bin -path '*/partitions/*' | head -n1)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::boot_app0.bin not found"
            exit 1
          fi

          mkdir -p site
          cp -r web/. site/

          # Per-board merged images. ESP Web Tools picks the right one from
          # the chipFamily field in manifest.json once the user clicks Connect.
          merge() {
            local env="$1" chip="$2" out="$3" size="$4"
            local build=".pio/build/${env}"
            esptool.py --chip "$chip" merge_bin \
              -o "site/${out}" \
              --flash_mode dio --flash_freq 80m --flash_size "${size}" \
              0x0000   "$build/bootloader.bin" \
              0x8000   "$build/partitions.bin" \
              0xe000   "$BOOT_APP0" \
              0x10000  "$build/firmware.bin"
          }
          merge esp32-c3-oled    esp32c3 firmware-esp32c3.bin       4MB
          merge lilygo-t-qt-pro  esp32s3 firmware-esp32s3-tqtpro.bin 4MB
          merge esp32-s3-n16r8   esp32s3 firmware-esp32s3-n16r8.bin 16MB

          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHORT_SHA=${GIT_SHA::7}

          # ESP Web Tools manifest with one build entry per chipFamily.
          # The S3 entry covers both T-QT Pro and N16R8 — we default to the
          # T-QT Pro image (4 MB, runs on either as long as flash >= 4 MB).
          # Users who want the full 16 MB N16R8 layout grab firmware-esp32s3-n16r8.bin
          # from the Releases / Pages site directly.
          cat > site/manifest.json <<JSON
          {
            "name": "HoneyOpus",
            "version": "${GIT_REF}-${SHORT_SHA}",
            "build_date": "${BUILD_DATE}",
            "home_assistant_domain": "honeyopus",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  { "path": "firmware-esp32c3.bin", "offset": 0 }
                ]
              },
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "firmware-esp32s3-tqtpro.bin", "offset": 0 }
                ]
              }
            ]
          }
          JSON

          # Bake the actual repo URL into the page so the link isn't a placeholder.
          sed -i "s#REPO_PLACEHOLDER#${REPO}#g" site/index.html

          ls -la site
          for f in site/firmware-*.bin; do
            echo "$(basename "$f"): $(stat -c%s "$f") bytes"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload firmware as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: honeyopus-firmware-${{ github.sha }}
          path: |
            site/firmware-*.bin
            site/manifest.json
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
